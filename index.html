<!DOCTYPE html>
<html>
<head>
    <title>VENNELLA JEWELLERY DESIGN STUDIO</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: #0A1A2F;
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }

        .hero img {
            width: 350px;
            margin-bottom: 20px;
        }

        h1 {
            color: #C0C0C0;
            font-size: 28px;
            letter-spacing: 3px;
            font-weight: 300;
            margin: 0;
        }

        h2 {
            color: #C0C0C0;
            font-size: 32px;
            letter-spacing: 2px;
            margin: 40px 0 20px 0;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1000px;
            margin: auto;
            padding: 0 20px 60px 20px;
        }

        .grid img {
            width: 100%;
            border-radius: 10px;
            border: 2px solid #C0C0C0;
        }
    </style>
</head>
<body>
    <div class="hero">
        <img src="logo.png" alt="Vennella Logo">
        <h1>VENNELLA JEWELLERY DESIGN STUDIO</h1>
    </div>

    <h2>OUR COLLECTIONS</h2>
    <div class="grid">
        <img src="jewellery1.jpg" alt="Diamond Collection">
        <img src="jewellery2.jpg" alt="Antique Jewellery">
        <img src="jewellery3.jpg" alt="Bridal Sets">
        <img src="jewellery4.jpg" alt="Gold Bangles">
        <img src="jewellery5.jpg" alt="Earrings">
        <img src="jewellery6.jpg" alt="Necklaces">
    </div>
</body>
</html>

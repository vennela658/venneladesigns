<!DOCTYPE html>
<html>
<head>
    <title>VENNELLA JEWELLERY DESIGN STUDIO</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom, #0A1A2F, #1A3A5F);
            min-height: 100vh;
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px 40px 20px;
            text-align: center;
        }

        .hero img {
            width: 280px;
            margin-bottom: 20px;
        }

        h1 {
            color: #FFFFFF;
            font-size: 24px;
            letter-spacing: 3px;
            font-weight: 600;
            margin: 0;
        }

        h2 {
            color: #FFFFFF;
            font-size: 28px;
            letter-spacing: 2px;
            margin: 50px 0 30px 0;
            text-align: center;
            font-weight: 600;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            max-width: 1100px;
            margin: auto;
            padding: 0 40px 60px 40px;
        }

        .grid img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.3);
            background: #0A1A2F;
        }
    </style>
</head>
<body>
    <div class="hero">
        <img src="https://i.imgur.com/8Q9ZxKp.png" alt="Vennella Logo">
        <h1>VENNELLA JEWELLERY DESIGN STUDIO</h1>
    </div>

    <h2>OUR COLLECTIONS</h2>
    <div class="grid">
        <img src="https://i.imgur.com/5n3Q2vL.jpg" alt="Diamond Collection">
        <img src="https://i.imgur.com/9bK1pQr.jpg" alt="Antique Jewellery">
        <img src="https://i.imgur.com/Lm7T4wZ.jpg" alt="Bridal Sets">
        <img src="https://i.imgur.com/3pR8sVw.jpg" alt="Gold Bangles">
        <img src="https://i.imgur.com/7kF2nXy.jpg" alt="Earrings">
        <img src="https://i.imgur.com/2vJ9mCz.jpg" alt="Necklaces">
    </div>
</body>
</html>

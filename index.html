<!DOCTYPE html>
<html>
<head>
  <title>VENNELLA JEWELLERY DESIGN STUDIO</title>
  <style>
    body { margin: 0; padding: 0; font-family: Arial; background: #0A1A2F; color: #C0C0C0; }
    .hero { text-align: center; padding: 60px 20px; }
    .hero img { width: 350px; margin-bottom: 20px; }
    h1 { font-size: 28px; letter-spacing: 3px; font-weight: 300; margin: 0; color: #C0C0C0; }
    h2 { text-align: center; font-size: 32px; letter-spacing: 2px; margin: 40px 0 20px 0; color: #C0C0C0; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 0 40px 60px 40px; max-width: 1200px; margin: auto; }
    .grid img { width: 100%; border-radius: 10px; height: 250px; object-fit: cover; border: 1px solid #C0C0C0; }
    h3 { color: #C0C0C0; font-weight: 300; letter-spacing: 1px; }
  </style>
</head>
<body>

  <div class="hero">
    <img src="logo.png" alt="Vennella Logo">
    <h1>VENNELLA JEWELLERY DESIGN STUDIO</h1>
  </div>

  <h2>OUR COLLECTIONS</h2>
  
  <div class="grid">
    <div><img src="diamond.jpg"><h3>Diamond Collection</h3></div>
    <div><img src="antique.jpg"><h3>Antique Jewellery</h3></div>
    <div><img src="Bridal Sets.jpg"><h3>Bridal Sets</h3></div>
    <div><img src="Temple Jewellery.jpg"><h3>Temple Jewellery</h3></div>
    <div><img src="polki.jpg"><h3>Polki Jewellery</h3></div>
    <div><img src="minimal.jpg"><h3>Minimal Wear</h3></div>
    <div><img src="rings.jpg"><h3>Rings</h3></div>
    <div><img src="custom.jpg"><h3>Custom Orders</h3></div>
  </div>

</body>
</html>
